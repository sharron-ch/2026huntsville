<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nashville & Huntsville · Family Trip Map 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Lora:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --tobacco: #2E1A08;
    --gold: #C9943A;
    --gold-light: #E8C97A;
    --cream: #FDF6E8;
    --d1: #C9943A;
    --d2: #2E5D8A;
    --d3: #2E5D8A;
    --d4: #1C3D5E;
    --d5: #4A6741;
    --d6: #C0392B;
    --d7: #A0522D;
    --warn: #E07B00;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; overflow:hidden; font-family:'Source Sans 3',sans-serif; }
  .app { display:flex; height:100vh; width:100vw; }

  /* SIDEBAR */
  .sidebar { width:340px; min-width:280px; background:var(--tobacco); display:flex; flex-direction:column; overflow:hidden; z-index:10; box-shadow:4px 0 20px rgba(0,0,0,0.4); flex-shrink:0; }

  .sidebar-header { background:var(--tobacco); padding:20px 20px 16px; border-bottom:2px solid var(--gold); flex-shrink:0; position:relative; overflow:hidden; }
  .sidebar-header::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 100% 100% at 50% 120%,rgba(201,148,58,.2) 0%,transparent 70%); pointer-events:none; }

  .trip-label { font-size:9px; font-weight:700; letter-spacing:.3em; text-transform:uppercase; color:var(--gold); margin-bottom:6px; position:relative; }
  .trip-title { font-family:'Abril Fatface',serif; font-size:1.45rem; color:var(--cream); line-height:1.05; position:relative; }
  .trip-title .amp { color:var(--gold); }
  .trip-sub { font-family:'Lora',serif; font-style:italic; font-size:.78rem; color:rgba(253,246,232,.55); margin-top:5px; position:relative; }

  /* DAY TABS */
  .day-tabs { display:flex; flex-wrap:wrap; gap:4px; padding:10px 14px; background:rgba(0,0,0,.25); border-bottom:1px solid rgba(201,148,58,.15); flex-shrink:0; }
  .day-tab { border:none; cursor:pointer; padding:5px 10px; border-radius:3px; font-family:'Source Sans 3',sans-serif; font-size:.68rem; font-weight:700; letter-spacing:.05em; transition:all .18s; background:rgba(255,255,255,.07); color:rgba(253,246,232,.5); border:1px solid rgba(255,255,255,.08); }
  .day-tab.active { color:var(--tobacco); border-color:transparent; }
  .day-tab[data-day="all"].active { background:var(--gold); }
  .day-tab[data-day="1"].active  { background:var(--d1); }
  .day-tab[data-day="2"].active  { background:var(--d2); color:white; }
  .day-tab[data-day="3"].active  { background:var(--d3); color:white; }
  .day-tab[data-day="4"].active  { background:var(--d4); color:white; }
  .day-tab[data-day="5"].active  { background:var(--d5); }
  .day-tab[data-day="6"].active  { background:var(--d6); color:white; }
  .day-tab[data-day="7"].active  { background:var(--d7); }

  /* STOP LIST */
  .stop-list { flex:1; overflow-y:auto; padding:10px 0; }
  .stop-list::-webkit-scrollbar { width:4px; }
  .stop-list::-webkit-scrollbar-track { background:transparent; }
  .stop-list::-webkit-scrollbar-thumb { background:rgba(201,148,58,.3); border-radius:2px; }

  .day-group { margin-bottom:4px; }
  .day-group-header { display:flex; align-items:center; gap:8px; padding:8px 16px 4px; font-size:.6rem; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:rgba(253,246,232,.4); position:sticky; top:0; background:var(--tobacco); z-index:1; }
  .day-group-header .dline { flex:1; height:1px; background:rgba(255,255,255,.06); }

  .stop-item { display:flex; gap:10px; align-items:flex-start; padding:9px 16px; cursor:pointer; border-left:3px solid transparent; transition:all .15s; }
  .stop-item:hover { background:rgba(255,255,255,.05); }
  .stop-item.active { background:rgba(201,148,58,.1); }

  .stop-dot { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.65rem; font-weight:700; flex-shrink:0; margin-top:1px; color:white; }
  .stop-info { flex:1; min-width:0; }
  .stop-time { font-size:.6rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; opacity:.65; margin-bottom:1px; }
  .stop-name { font-size:.82rem; font-weight:600; color:var(--cream); line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .stop-type { font-size:.68rem; color:rgba(253,246,232,.4); margin-top:1px; font-family:'Lora',serif; font-style:italic; }
  .stop-warn { font-size:.62rem; color:#ffb020; margin-top:2px; }

  .sidebar-footer { padding:10px 16px; border-top:1px solid rgba(201,148,58,.15); font-size:.68rem; color:rgba(253,246,232,.3); flex-shrink:0; text-align:center; line-height:1.5; }

  /* MAP */
  #map { flex:1; height:100%; background:#e8dcc8; }

  /* POPUP */
  .leaflet-popup-content-wrapper { background:var(--tobacco) !important; border:1px solid var(--gold) !important; border-radius:6px !important; box-shadow:0 8px 24px rgba(0,0,0,.4) !important; padding:0 !important; }
  .leaflet-popup-tip { background:var(--tobacco) !important; }
  .leaflet-popup-content { margin:0 !important; width:250px !important; }
  .popup-inner { padding:14px 16px; }
  .popup-day-badge { display:inline-block; padding:2px 8px; border-radius:2px; font-size:.62rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; margin-bottom:7px; color:var(--tobacco); }
  .popup-time { font-size:.65rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:rgba(253,246,232,.5); margin-bottom:3px; }
  .popup-name { font-family:'Lora',serif; font-size:.95rem; font-weight:600; color:var(--cream); line-height:1.35; margin-bottom:7px; }
  .popup-note { font-size:.76rem; color:rgba(253,246,232,.65); line-height:1.55; border-top:1px solid rgba(201,148,58,.2); padding-top:8px; font-family:'Lora',serif; font-style:italic; }
  .popup-alert { font-size:.74rem; color:#ffb020; line-height:1.5; border-top:1px solid rgba(224,123,0,.3); padding-top:8px; margin-top:6px; }
  .popup-gmaps { display:block; margin-top:10px; padding:6px 0; text-align:center; background:var(--gold); color:var(--tobacco) !important; font-size:.72rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; text-decoration:none !important; border-radius:3px; transition:background .15s; }
  .popup-gmaps:hover { background:var(--gold-light); }

  @media(max-width:680px){
    .app { flex-direction:column; }
    .sidebar { width:100%; height:45vh; min-width:0; box-shadow:0 4px 20px rgba(0,0,0,.4); }
    #map { flex:1; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="trip-label">Family Trip · June 29 – July 5, 2026</div>
      <div class="trip-title">NASHVILLE <span class="amp">&</span> HUNTSVILLE</div>
      <div class="trip-sub">Music, Rockets & Fireworks · 7 Days</div>
    </div>

    <div class="day-tabs" id="dayTabs">
      <button class="day-tab active" data-day="all" onclick="filterDay('all')">All</button>
      <button class="day-tab" data-day="1" onclick="filterDay(1)">Day 1</button>
      <button class="day-tab" data-day="2" onclick="filterDay(2)">Day 2</button>
      <button class="day-tab" data-day="3" onclick="filterDay(3)">Day 3</button>
      <button class="day-tab" data-day="4" onclick="filterDay(4)">Day 4</button>
      <button class="day-tab" data-day="5" onclick="filterDay(5)">Day 5</button>
      <button class="day-tab" data-day="6" onclick="filterDay(6)">Day 6</button>
      <button class="day-tab" data-day="7" onclick="filterDay(7)">Day 7</button>
    </div>

    <div class="stop-list" id="stopList"></div>

    <div class="sidebar-footer">
      Click any stop to zoom in · Tap "Open in Google Maps" for navigation<br>
      🎸 Nashville, TN &nbsp;·&nbsp; 🚀 Huntsville, AL · 2026
    </div>
  </aside>

  <div id="map"></div>
</div>

<script>
const DAYS = [
  { day:1, label:'Sun 6/29', title:'Arrival + Johnny Cash Museum',       color:'#C9943A' },
  { day:2, label:'Mon 6/30', title:'Country Music HOF + Ryman',          color:'#2E5D8A' },
  { day:3, label:'Tue 7/1',  title:'Cheekwood → Huntsville',             color:'#2E5D8A' },
  { day:4, label:'Wed 7/2',  title:'U.S. Space & Rocket Center',         color:'#1C3D5E' },
  { day:5, label:'Thu 7/3',  title:'Huntsville Exploration',             color:'#4A6741' },
  { day:6, label:'Fri 7/4',  title:'Back to Nashville 🎆',               color:'#C0392B' },
  { day:7, label:'Sat 7/5',  title:'Departure ✈️',                       color:'#A0522D' },
];

const STOPS = [
  // Day 1
  { day:1, seq:1, time:'2:45 PM',  emoji:'✈️', name:'BNA Nashville Airport',               type:'Airport · Pickup',       lat:36.1249, lng:-86.6762, note:'Land here · pick up 2 SUVs at Dollar Rent-A-Car inside terminal · document any damage!', gmaps:'https://maps.google.com/?q=BNA+Nashville+Airport' },
  { day:1, seq:2, time:'4:00 PM',  emoji:'🎸', name:'Johnny Cash Museum',                  type:'Museum',                 lat:36.1609, lng:-86.7758, note:'Guitars, stage wear, letters & film. 1–1.5 hrs. Open daily 9 AM–7 PM. Buy tickets in advance!', gmaps:'https://maps.google.com/?cid=12701666461124076277' },
  { day:1, seq:3, time:'6:00 PM',  emoji:'🌆', name:'Broadway Strip',                       type:'Sightseeing',            lat:36.1608, lng:-86.7786, note:'Neon honky tonks & live music spilling into the street', gmaps:'https://maps.google.com/?q=Broadway+Nashville+TN' },
  { day:1, seq:4, time:'7:00 PM',  emoji:'🍽️', name:'Assembly Food Hall',                  type:'Dinner',                 lat:36.1610, lng:-86.7793, note:'30+ food stalls, live music — perfect for the whole group', gmaps:'https://maps.google.com/?cid=12003880854105045741' },
  { day:1, seq:5, time:'8:30 PM',  emoji:'🏨', name:'Holiday Inn Express MetroCenter',      type:'Hotel (nights 1–2)',     lat:36.1881, lng:-86.7954, note:'Breakfast included · home base for first 2 nights', gmaps:'https://maps.google.com/?cid=4424402649690640270' },

  // Day 2 — Cheekwood REMOVED (closed Mondays). Country Music HOF + Ryman instead.
  { day:2, seq:1, time:'9:00 AM',  emoji:'🎶', name:'Country Music Hall of Fame',           type:'Museum',                 lat:36.1583, lng:-86.7761, note:'Two floors · Dolly Parton section · A/C throughout · buy tickets in advance!', gmaps:'https://maps.google.com/?cid=11941312864776359527', alert:'Open Mondays ✅' },
  { day:2, seq:2, time:'2:30 PM',  emoji:'🎼', name:'Ryman Auditorium',                     type:'Historic Venue Tour',    lat:36.1612, lng:-86.7785, note:'Now open all 7 days in 2026 (Thursday closure no longer applies!) ✅', gmaps:'https://maps.google.com/?cid=7133835491838936491', alert:'Open Mondays ✅ (now open all 7 days)' },
  { day:2, seq:3, time:'7:00 PM',  emoji:'🎺', name:'Honky Tonk Central',                  type:'Dinner & Live Music',    lat:36.1609, lng:-86.7769, note:'Free live music · 3 floors · grab 3rd-floor balcony for Broadway views!', gmaps:'https://maps.google.com/?cid=15642269363436063353' },

  // Day 3
  { day:3, seq:1, time:'9:00 AM',  emoji:'🌸', name:'Cheekwood Estate & Gardens',           type:'Gardens / Museum',       lat:36.0884, lng:-86.8760, note:'55 acres · 2–3 hrs · some uneven terrain, prepare for seniors · buy tickets in advance! Open Tuesdays ✅', gmaps:'https://maps.google.com/?cid=13992208353136058915' },
  { day:3, seq:2, time:'1:30 PM',  emoji:'🛣️', name:'Drive: Nashville → Huntsville',        type:'~2 hr Highway Drive',    lat:35.3690, lng:-86.6500, note:'Easy highway south after Cheekwood lunch · arrive Uncle T.S.\'s ~3:30 PM', gmaps:'https://maps.google.com/dir/Nashville,TN/Huntsville,AL' },
  { day:3, seq:3, time:'Evening',  emoji:'🍽️', name:'Dinner — Uncle T.S. Recommends',        type:'Dinner',                 lat:34.7300, lng:-86.5860, note:'Let Uncle T.S. pick! He knows Huntsville best 🏠', gmaps:'https://maps.google.com/?q=Huntsville+AL+restaurants' },

  // Day 4
  { day:4, seq:1, time:'9:00 AM',  emoji:'🚀', name:'U.S. Space & Rocket Center',           type:'Museum (Full Day)',      lat:34.7111, lng:-86.6539, note:'Saturn V Hall · Planetarium · Rocket Garden · ask about mobility aids for seniors!', gmaps:'https://maps.google.com/?cid=4481699958921937198' },
  { day:4, seq:2, time:'6:00 PM',  emoji:'🧀', name:'MELT Huntsville',                      type:'Dinner',                 lat:34.7322, lng:-86.5875, note:'Beloved grilled cheese & comfort food downtown', gmaps:'https://maps.google.com/?cid=40910024712093119' },

  // Day 5
  { day:5, seq:1, time:'9:00 AM',  emoji:'🌺', name:'Huntsville Botanical Garden',          type:'Gardens',                lat:34.7075, lng:-86.6340, note:'Paved paths · summer blooms · relaxed pace · accessible for seniors', gmaps:'https://maps.google.com/?cid=11307606841543633370' },
  { day:5, seq:2, time:'12:00 PM', emoji:'🍜', name:'Viet Cuisine',                          type:'Lunch',                  lat:34.7420, lng:-86.6350, note:'Authentic Vietnamese · pho, banh mi, lemongrass beef · $2–$15 · 10 min from Botanical Garden · open Thursdays ✅', gmaps:'https://maps.google.com/?q=Viet+Cuisine+210+Jordan+Lane+Huntsville+AL' },
  { day:5, seq:3, time:'1:30 PM',  emoji:'🏛️', name:'EarlyWorks Children\'s Museum',        type:'Kids Museum',            lat:34.7281, lng:-86.5844, note:'Hands-on history for kids · indoors & A/C · open Thursdays ✅', gmaps:'https://maps.google.com/?cid=4966086372931804481' },
  { day:5, seq:4, time:'Evening',  emoji:'🍷', name:'Mazzara\'s Vinoteca',                   type:'Dinner',                 lat:34.7290, lng:-86.5848, note:'Fresh handmade Italian pasta · historic building next to EarlyWorks · reserve ahead! · open Thu 4:30–9 PM ✅ · open to Uncle T.S. recommendations', gmaps:'https://maps.google.com/?q=Mazzara+Vinoteca+102+Gates+Ave+Huntsville+AL' },

  // Day 6
  { day:6, seq:1, time:'3:00 PM',  emoji:'🌊', name:'Riverfront Park (Cumberland River)',   type:'Park / Fireworks Spot',  lat:36.1694, lng:-86.7779, note:'Flat riverside walk · stake out spot EARLY for 9 PM fireworks! 🎆', gmaps:'https://maps.google.com/?cid=8929440521236858735' },
  { day:6, seq:2, time:'9:30 PM',  emoji:'🚗', name:'Dollar Car Rental @ BNA',              type:'Car Return',             lat:36.1322, lng:-86.6671, note:'Return both SUVs here after fireworks · open until midnight', gmaps:'https://maps.google.com/?cid=12960792931517365284' },
  { day:6, seq:3, time:'10:00 PM', emoji:'🏨', name:'Element Nashville Airport',            type:'Hotel',                  lat:36.1480, lng:-86.6647, note:'Marriott · kitchenette suites · 5 min from BNA', gmaps:'https://maps.google.com/?cid=10964057377222420840' },
  { day:6, seq:4, time:'10:00 PM', emoji:'🏨', name:'Holiday Inn Express Nashville Airport',type:'Hotel',                  lat:36.1433, lng:-86.6629, note:'IHG · free breakfast · 5 min from BNA · confirm room quality at check-in', gmaps:'https://maps.google.com/?cid=12576959780022193658' },

  // Day 7
  { day:7, seq:1, time:'6:00 AM',  emoji:'✈️', name:'BNA Nashville Airport — Departure',    type:'Departure',              lat:36.1249, lng:-86.6762, note:'Both hotels are 5 min from terminal · check in for flights the night before!', gmaps:'https://maps.google.com/?q=BNA+Nashville+Airport' },
];

// MAP
const map = L.map('map',{ center:[35.4,-86.75], zoom:8, zoomControl:false });
L.control.zoom({ position:'bottomright' }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
  subdomains:'abcd', maxZoom:19
}).addTo(map);

const markers=[], layersByDay={}, routeLayersByDay={};
DAYS.forEach(d=>{ layersByDay[d.day]=L.layerGroup(); routeLayersByDay[d.day]=L.layerGroup(); });

function makeIcon(color,label){
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40"><path d="M16 0C7.16 0 0 7.16 0 16c0 10.5 16 24 16 24S32 26.5 32 16C32 7.16 24.84 0 16 0z" fill="${color}"/><circle cx="16" cy="16" r="10" fill="white" opacity="0.25"/><text x="16" y="21" text-anchor="middle" font-family="Source Sans 3,sans-serif" font-size="11" font-weight="700" fill="white">${label}</text></svg>`;
  return L.divIcon({ html:svg, className:'', iconSize:[32,40], iconAnchor:[16,40], popupAnchor:[0,-42] });
}

STOPS.forEach((s,i)=>{
  const di=DAYS.find(d=>d.day===s.day);
  const marker=L.marker([s.lat,s.lng],{ icon:makeIcon(di.color,s.seq) });
  const alertHtml = s.alert ? `<div class="popup-alert">✅ ${s.alert}</div>` : '';
  const popupHTML=`<div class="popup-inner"><div class="popup-day-badge" style="background:${di.color}">${di.label}</div><div class="popup-time">${s.time}</div><div class="popup-name">${s.emoji} ${s.name}</div>${s.note?`<div class="popup-note">${s.note}</div>`:''}${alertHtml}<a class="popup-gmaps" href="${s.gmaps}" target="_blank">Open in Google Maps ↗</a></div>`;
  marker.bindPopup(popupHTML,{ maxWidth:270, minWidth:250 });
  marker.on('click',()=>{ highlightStop(i); scrollToStop(i); });
  layersByDay[s.day].addLayer(marker);
  markers.push({ marker, stop:s, idx:i });
});

DAYS.forEach(d=>{
  const pts=STOPS.filter(s=>s.day===d.day).map(s=>[s.lat,s.lng]);
  if(pts.length>1){ routeLayersByDay[d.day].addLayer(L.polyline(pts,{ color:d.color, weight:2.5, opacity:0.5, dashArray:'6 6' })); }
});

DAYS.forEach(d=>{ layersByDay[d.day].addTo(map); routeLayersByDay[d.day].addTo(map); });

function buildList(dayFilter){
  const list=document.getElementById('stopList');
  list.innerHTML='';
  const daysToShow=dayFilter==='all'?DAYS.map(d=>d.day):[dayFilter];
  daysToShow.forEach(dayNum=>{
    const di=DAYS.find(d=>d.day===dayNum);
    const stopsForDay=STOPS.filter(s=>s.day===dayNum);
    const g=document.createElement('div'); g.className='day-group'; g.dataset.day=dayNum;
    const h=document.createElement('div'); h.className='day-group-header';
    h.innerHTML=`<span style="color:${di.color}">Day ${dayNum}</span><span>${di.label} · ${di.title}</span><span class="dline"></span>`;
    g.appendChild(h);
    stopsForDay.forEach(s=>{
      const gi=STOPS.indexOf(s);
      const item=document.createElement('div'); item.className='stop-item'; item.id=`stop-${gi}`;
      item.onclick=()=>{
        const m=markers.find(m=>m.idx===gi);
        if(m){ map.setView([s.lat,s.lng],15,{animate:true}); setTimeout(()=>m.marker.openPopup(),400); highlightStop(gi); }
      };
      const warnHtml = s.alert ? `<div class="stop-warn">✅ ${s.alert}</div>` : '';
      item.innerHTML=`<div class="stop-dot" style="background:${di.color}">${s.seq}</div><div class="stop-info"><div class="stop-time" style="color:${di.color}">${s.time}</div><div class="stop-name">${s.emoji} ${s.name}</div><div class="stop-type">${s.type}</div>${warnHtml}</div>`;
      g.appendChild(item);
    });
    list.appendChild(g);
  });
}

function highlightStop(idx){ document.querySelectorAll('.stop-item').forEach(el=>el.classList.remove('active')); const el=document.getElementById(`stop-${idx}`); if(el)el.classList.add('active'); }
function scrollToStop(idx){ const el=document.getElementById(`stop-${idx}`); if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'}); }

let activeDay='all';
function filterDay(day){
  activeDay=day;
  document.querySelectorAll('.day-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`[data-day="${day}"]`).classList.add('active');
  DAYS.forEach(d=>{
    if(day==='all'||d.day===day){ layersByDay[d.day].addTo(map); routeLayersByDay[d.day].addTo(map); }
    else { map.removeLayer(layersByDay[d.day]); map.removeLayer(routeLayersByDay[d.day]); }
  });
  buildList(day);
  if(day==='all'){ map.setView([35.4,-86.75],8,{animate:true}); }
  else { const pts=STOPS.filter(s=>s.day===day).map(s=>[s.lat,s.lng]); if(pts.length>0) map.fitBounds(pts,{padding:[50,50],maxZoom:14,animate:true}); }
}

buildList('all');
</script>
</body>
</html>
